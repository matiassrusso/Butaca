services:
  - type: web
    name: pelipick-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PELIPICK_ALLOWED_ORIGINS
        value: https://pelipick.vercel.app
      - key: DATABASE_URL
        sync: false
